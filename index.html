<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Strength Checker</title>
  <style>
    :root {
      --bg-a: #0f172a;
      --bg-b: #164e63;
      --bg-c: #7c2d12;
      --card: rgba(255, 255, 255, 0.14);
      --card-border: rgba(255, 255, 255, 0.28);
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.72);
      --field: rgba(15, 23, 42, 0.42);
      --danger: #fb7185;
      --warning: #fbbf24;
      --good: #34d399;
      --great: #60a5fa;
      --shadow: rgba(2, 6, 23, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 14% 18%, rgba(52, 211, 153, 0.36), transparent 26%),
        radial-gradient(circle at 82% 24%, rgba(96, 165, 250, 0.34), transparent 30%),
        radial-gradient(circle at 52% 82%, rgba(251, 191, 36, 0.26), transparent 31%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b), var(--bg-c));
      background-size: 160% 160%;
      animation: drift 15s ease-in-out infinite alternate;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), transparent 85%);
    }

    @keyframes drift {
      from {
        background-position: 0% 20%;
      }
      to {
        background-position: 100% 80%;
      }
    }

    .wrap {
      width: min(94vw, 460px);
      padding: 24px;
    }

    .checker {
      position: relative;
      overflow: hidden;
      padding: clamp(24px, 5vw, 34px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08));
      box-shadow: 0 28px 70px var(--shadow);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
    }

    .checker::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.28), transparent 32%);
      opacity: 0.46;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .badge {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
      margin-bottom: 18px;
    }

    .badge svg,
    .toggle svg,
    .status-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.45rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 14px 0 26px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: rgba(248, 250, 252, 0.82);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .input-row {
      display: flex;
      align-items: center;
      min-height: 58px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 18px;
      background: var(--field);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
    }

    .input-row:focus-within {
      border-color: rgba(255, 255, 255, 0.62);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.11), inset 0 1px 0 rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    input {
      width: 100%;
      min-width: 0;
      padding: 0 0 0 18px;
      color: var(--text);
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 1rem;
      line-height: 58px;
    }

    input::placeholder {
      color: rgba(248, 250, 252, 0.48);
    }

    .toggle {
      flex: 0 0 46px;
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      margin-right: 6px;
      color: rgba(248, 250, 252, 0.78);
      border: 0;
      border-radius: 14px;
      background: transparent;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .toggle:hover,
    .toggle:focus-visible {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.14);
      transform: scale(1.04);
      outline: 0;
    }

    .meter-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--muted);
      font-weight: 800;
    }

    .status-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      flex: 0 0 34px;
      border-radius: 12px;
      color: rgba(248, 250, 252, 0.82);
      background: rgba(255, 255, 255, 0.13);
      transition: color 0.25s ease, background 0.25s ease;
    }

    .score {
      color: rgba(248, 250, 252, 0.72);
      font-size: 0.84rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .bar {
      width: 100%;
      height: 13px;
      margin-top: 13px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.36);
      box-shadow: inset 0 1px 3px rgba(2, 6, 23, 0.36);
    }

    .fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--danger), var(--warning));
      box-shadow: 0 0 20px rgba(251, 113, 133, 0.42);
      transition: width 0.45s cubic-bezier(0.22, 1, 0.36, 1), background 0.3s ease, box-shadow 0.3s ease;
    }

    .suggestions {
      display: grid;
      gap: 9px;
      margin: 22px 0 0;
      padding: 0;
      list-style: none;
    }

    .suggestions li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      color: rgba(248, 250, 252, 0.76);
      background: rgba(255, 255, 255, 0.09);
      font-size: 0.9rem;
      line-height: 1.35;
      transform: translateY(0);
      animation: rise 0.28s ease both;
    }

    .suggestions svg {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      margin-top: 1px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .weak .fill {
      width: 25%;
      background: linear-gradient(90deg, #fb7185, #f43f5e);
      box-shadow: 0 0 20px rgba(244, 63, 94, 0.44);
    }

    .medium .fill {
      width: 50%;
      background: linear-gradient(90deg, #f97316, #fbbf24);
      box-shadow: 0 0 20px rgba(251, 191, 36, 0.44);
    }

    .strong .fill {
      width: 75%;
      background: linear-gradient(90deg, #14b8a6, #34d399);
      box-shadow: 0 0 20px rgba(52, 211, 153, 0.44);
    }

    .very-strong .fill {
      width: 100%;
      background: linear-gradient(90deg, #22c55e, #60a5fa);
      box-shadow: 0 0 24px rgba(96, 165, 250, 0.5);
    }

    .weak .status-icon,
    .weak #strengthText {
      color: var(--danger);
    }

    .medium .status-icon,
    .medium #strengthText {
      color: var(--warning);
    }

    .strong .status-icon,
    .strong #strengthText {
      color: var(--good);
    }

    .very-strong .status-icon,
    .very-strong #strengthText {
      color: var(--great);
    }

    @media (max-width: 420px) {
      .wrap {
        padding: 14px;
      }

      .checker {
        border-radius: 22px;
      }

      .meter-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .score {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="checker" id="checker" aria-labelledby="title">
      <div class="content">
        <div class="badge" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"></path>
            <path d="m9 12 2 2 4-5"></path>
          </svg>
        </div>

        <h1 id="title">Password Strength Checker</h1>
        <p class="subtitle">Type a password to get instant strength feedback and practical suggestions.</p>

        <label for="password">Password</label>
        <div class="input-row">
          <input id="password" type="password" placeholder="Enter your password" autocomplete="new-password" />
          <button class="toggle" id="toggle" type="button" aria-label="Show password" title="Show password">
            <svg id="eyeIcon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>

        <div class="meter-header">
          <div class="status">
            <span class="status-icon" aria-hidden="true">
              <svg id="statusIcon" viewBox="0 0 24 24">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"></path>
              </svg>
            </span>
            <span id="strengthText">Start typing</span>
          </div>
          <span class="score" id="scoreText">0 / 8 checks</span>
        </div>

        <div class="bar" aria-hidden="true">
          <div class="fill" id="fill"></div>
        </div>

        <ul class="suggestions" id="suggestions" aria-live="polite"></ul>
      </div>
    </section>
  </main>

  <script>
    const password = document.getElementById("password");
    const toggle = document.getElementById("toggle");
    const eyeIcon = document.getElementById("eyeIcon");
    const checker = document.getElementById("checker");
    const strengthText = document.getElementById("strengthText");
    const scoreText = document.getElementById("scoreText");
    const suggestions = document.getElementById("suggestions");
    const statusIcon = document.getElementById("statusIcon");

    const icons = {
      eye: '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"></path><circle cx="12" cy="12" r="3"></circle>',
      eyeOff: '<path d="m3 3 18 18"></path><path d="M10.6 10.6A2 2 0 0 0 12 14a2 2 0 0 0 1.4-.6"></path><path d="M9.9 4.2A10.7 10.7 0 0 1 12 4c6.5 0 10 8 10 8a17.8 17.8 0 0 1-2.5 3.7"></path><path d="M6.6 6.6C3.7 8.5 2 12 2 12s3.5 8 10 8c1.5 0 2.8-.4 4-.9"></path>',
      shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"></path>',
      check: '<path d="M20 6 9 17l-5-5"></path>',
      alert: '<path d="M10.3 3.4 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.4a2 2 0 0 0-3.4 0Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path>',
      spark: '<path d="m12 3 1.9 5.8L20 11l-6.1 2.2L12 19l-1.9-5.8L4 11l6.1-2.2L12 3Z"></path>'
    };

    const rules = [
      { test: value => value.length >= 8, message: "Use at least 8 characters." },
      { test: value => value.length >= 12, message: "Make it 12 characters or longer." },
      { test: value => /[a-z]/.test(value), message: "Add lowercase letters." },
      { test: value => /[A-Z]/.test(value), message: "Add uppercase letters." },
      { test: value => /\d/.test(value), message: "Add at least one number." },
      { test: value => /[^A-Za-z0-9]/.test(value), message: "Add a symbol such as @, #, or !." },
      { test: value => !/(.)\1{2,}/.test(value), message: "Avoid repeating the same character." },
      { test: value => !/(password|admin|qwerty|1234|welcome|letmein)/i.test(value), message: "Avoid common words and patterns." }
    ];

    function getStrength(score, value) {
      if (!value) {
        return { label: "Start typing", className: "", icon: icons.shield };
      }

      if (score <= 3) {
        return { label: "Weak", className: "weak", icon: icons.alert };
      }

      if (score <= 5) {
        return { label: "Medium", className: "medium", icon: icons.shield };
      }

      if (score <= 7) {
        return { label: "Strong", className: "strong", icon: icons.check };
      }

      return { label: "Very Strong", className: "very-strong", icon: icons.spark };
    }

    function render() {
      const value = password.value;
      const passed = rules.filter(rule => rule.test(value));
      const failed = rules.filter(rule => !rule.test(value));
      const strength = getStrength(passed.length, value);

      checker.className = `checker ${strength.className}`.trim();
      strengthText.textContent = strength.label;
      scoreText.textContent = `${passed.length} / ${rules.length} checks`;
      statusIcon.innerHTML = strength.icon;

      suggestions.innerHTML = "";

      const items = value
        ? failed.slice(0, 4).map(rule => rule.message)
        : ["Start with a memorable phrase, then mix length, case, numbers, and symbols."];

      if (value && failed.length === 0) {
        items.push("Excellent password structure.");
      }

      items.forEach((item, index) => {
        const li = document.createElement("li");
        li.style.animationDelay = `${index * 45}ms`;
        li.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true">${value && failed.length === 0 ? icons.check : icons.spark}</svg><span>${item}</span>`;
        suggestions.appendChild(li);
      });
    }

    toggle.addEventListener("click", () => {
      const isHidden = password.type === "password";
      password.type = isHidden ? "text" : "password";
      toggle.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
      toggle.setAttribute("title", isHidden ? "Hide password" : "Show password");
      eyeIcon.innerHTML = isHidden ? icons.eyeOff : icons.eye;
      password.focus();
    });

    password.addEventListener("input", render);
    render();
  </script>
</body>
</html>
